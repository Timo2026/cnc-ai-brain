name: quote
category: manufacturing
timeout: 120
executor: src.skills.quote_skill
schema:
  type: object
  required: [material, quantity]
  properties:
    material:
      type: string
      description: 材料牌号
    quantity:
      type: integer
      minimum: 1
      description: 数量
    surface_treatment:
      type: string
      description: 表面处理
    tolerance:
      type: string
      description: 公差等级
