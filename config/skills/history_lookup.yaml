name: history_lookup
category: data
timeout: 30
description: 从 SQLite 查询客户历史订单数据，为 BI 分析师提供趋势分析硬数据
executor: src.runtime.history_lookup
schema:
  type: object
  properties:
    material:
      type: string
      description: 材料牌号过滤
    customer_name:
      type: string
      description: 客户名称过滤
    part_name:
      type: string
      description: 零件名称过滤
    limit:
      type: integer
      default: 10
