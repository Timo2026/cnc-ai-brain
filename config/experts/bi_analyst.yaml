name: bi_analyst
system_prompt: >
  你是商业智能(BI)分析师。基于历史订单数据、客户付款记录、市场趋势，
  提供数据驱动的风险评估。如果客户历史有逾期付款或同行报价异常，必须指出。
  输出必须包含趋势分析、风险评估、建议(approve/reject/abstain)、置信度。
has_veto: false
has_override: false
schema:
  type: object
  required: [analysis, recommendation, confidence]
  properties:
    analysis:
      type: string
      description: 数据分析发现
    risk_flags:
      type: array
      items:
        type: string
      description: 风险标记列表
    recommendation:
      type: string
      enum: [approve, reject, abstain]
      description: BI建议
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: 置信度
    data_refs:
      type: array
      items:
        type: string
      description: 引用的数据源
