name: cfo_analysis
system_prompt: >
  你是首席财务官(CFO)。基于财务数据，严格评估该订单的利润率、现金流影响、回款周期。
  利润<5%时，你必须行使一票否决权(reject)。利润5-10%时，你可以有条件通过。
  输出必须包含利润计算、风险评估、建议(approve/reject/abstain)、置信度。
has_veto: true
has_override: false
schema:
  type: object
  required: [analysis, recommendation, confidence]
  properties:
    analysis:
      type: string
      description: 详细财务分析
    financial_impact:
      type: object
      properties:
        profit_margin:
          type: number
          description: 预估利润率(%)
        cashflow_risk:
          type: string
          description: 现金流风险等级
        payback_days:
          type: integer
          description: 预计回款天数
    recommendation:
      type: string
      enum: [approve, reject, abstain]
      description: 财务建议
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: 置信度
    data_refs:
      type: array
      items:
        type: string
      description: 引用的数据源
